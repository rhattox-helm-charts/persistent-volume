name: Helm Chart CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.3

      - name: Lint Helm charts
        run: |
          helm lint persistent-volume

      - name: Package Helm charts
        run: |
          mkdir -p packaged
          helm package persistent-volume --destination packaged

      - name: Upload packaged charts as artifact
        uses: actions/upload-artifact@v4
        with:
          name: packaged-charts
          path: packaged

  deploy:
    needs: lint-test-package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download chart artifacts
        uses: actions/download-artifact@v4
        with:
          name: packaged-charts
          path: new-charts

      - name: Update Helm repo index
        run: |
          cd gh-pages
          cp ../new-charts/*.tgz .
          helm repo index . --url https://rhattox-helm-charts.github.io/persistent-volume
          cd ..

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update Helm charts" || echo "No changes to commit"
          git push
        env:
          GH_TOKEN: ${{ secrets.GHA_TOKEN }}
